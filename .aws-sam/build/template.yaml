AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Multi-Agent CTI Ingestion Pipeline with Financial Guardrails
Resources:
  CtiFailedMessagesDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: CTI-Failed-Messages-DLQ-SAM
  CtiIngestionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: CTI-Ingestion-Queue-SAM
      VisibilityTimeout: 300
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
          - CtiFailedMessagesDLQ
          - Arn
        maxReceiveCount: 3
  CtiLambdaWorker:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CTI-Lambda-Worker-SAM
      CodeUri: CtiLambdaWorker
      Handler: src.lambda_worker.lambda_handler
      Runtime: python3.13
      Timeout: 180
      MemorySize: 512
      Environment:
        Variables:
          BEDROCK_MODEL_ID: meta.llama3-8b-instruct-v1:0
          DB_HOST:
            Fn::GetAtt:
            - CtiDatabase
            - Endpoint.Address
          DB_NAME: postgres
          DB_USER: cti_admin
          DB_PASSWORD_PARAM: CTI_DB_PASSWORD
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - CtiIngestionQueue
              - Arn
            BatchSize: 1
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - bedrock:InvokeModel
          Resource: '*'
      - Statement:
        - Effect: Allow
          Action:
          - ssm:GetParameter
          Resource:
            Fn::Sub: arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/CTI_DB_PASSWORD
    Metadata:
      SamResourceId: CtiLambdaWorker
  CtiDatabase:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.micro
      Engine: postgres
      EngineVersion: '15'
      AllocatedStorage: 20
      MasterUsername: cti_admin
      MasterUserPassword: '{{resolve:ssm-secure:CTI_DB_PASSWORD:1}}'
      PubliclyAccessible: false

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Lambda-Only Deployment linked to manual AWS Console resources

Parameters:
  DbHostParam:
    Type: String
    Description: The Endpoint URL of your manual RDS instance
  DbPasswordParam:
    Type: String
    NoEcho: true

Resources:
  CtiLambdaWorker:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CTI-Lambda-Worker
      CodeUri: . 
      Handler: lambda_worker.lambda_handler
      Runtime: python3.13
      Timeout: 180 
      MemorySize: 512
      ReservedConcurrentExecutions: 5
      
      # Automatically targets the IAM role you built manually
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/CTI-Lambda-Worker-Role"
      
      Environment:
        Variables:
          BEDROCK_MODEL_ID: "meta.llama3-8b-instruct-v1:0"
          DB_HOST: !Ref DbHostParam
          DB_USER: cti_admin
          DB_NAME: postgres
          DB_PASSWORD: !Ref DbPasswordParam
          
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            # Dynamically targets the queue you built manually
            Queue: !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:CTI-Ingestion-Queue"
            BatchSize: 1